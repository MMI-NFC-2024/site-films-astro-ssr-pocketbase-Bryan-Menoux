name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          cp package.json dist/
          cp package-lock.json dist/
          test -f dist/server/entry.mjs

      - name: Clean remote directory before deploy (keep only .env and ecosystem.config.cjs)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/tpvps
            find . -mindepth 1 -maxdepth 1 ! -name '.env' ! -name 'ecosystem.config.cjs' -exec rm -rf {} +
            ls -la

      - name: Upload dist to VPS
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/**"
          target: "/var/www/tpvps"
          rm: false
          overwrite: true

      - name: Install deps in dist and restart PM2 (FORCE PORT 8085)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/tpvps
            test -f dist/server/entry.mjs

            cd dist
            npm ci --omit=dev
            node -e "const p=require('./package.json'); const deps=Object.keys(p.dependencies||{}); for (const d of deps){ try { require.resolve(d); console.log('[OK]', d); } catch (e) { console.error('[MISSING]', d); process.exit(1); } }"

            cd /var/www/tpvps

            pm2 delete tpvps || true

            # 🔥 FORÇAGE EXPLICITE DU PORT ASTRO
            PORT=8088 HOST=0.0.0.0 pm2 start dist/server/entry.mjs \
              --name tpvps \
              --cwd /var/www/tpvps \
              --update-env

            pm2 save

            echo "=== Vérification écoute port 8088 ==="
            ss -ltnp | grep 8088 || true

            echo "=== Test HTTP local ==="
            curl -I http://127.0.0.1:8088/ || true
